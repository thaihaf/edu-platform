name: Frontend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
      NEXT_PUBLIC_AUTH_MODE: mock
      NEXT_PUBLIC_MOCK_MODE: "true"
      NEXT_PUBLIC_POLLING_INTERVAL_MS: "5000"
      NEXT_PUBLIC_ENVIRONMENT_LABEL: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm --prefix apps/web ci
      - run: npm --prefix apps/web run format:check
      - run: npm --prefix apps/web run lint
      - run: npm --prefix apps/web run typecheck
      - run: npm --prefix apps/web run test
      - run: npm --prefix apps/web run build

  browser-smoke:
    name: Mocked browser smoke
    runs-on: ubuntu-latest
    needs: frontend
    env:
      CI: "true"
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000/api/v1
      NEXT_PUBLIC_AUTH_MODE: mock
      NEXT_PUBLIC_MOCK_MODE: "true"
      NEXT_PUBLIC_POLLING_INTERVAL_MS: "5000"
      NEXT_PUBLIC_ENVIRONMENT_LABEL: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm --prefix apps/web ci
      - run: npm --prefix apps/web exec -- playwright install --with-deps chromium
      - run: npm --prefix apps/web run build
      - run: npm --prefix apps/web run e2e:mock
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
