services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_course
      POSTGRES_USER: ai_course
      POSTGRES_PASSWORD: ai_course
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_course -d ai_course"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports: ["6379:6379"]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]

  searxng:
    image: searxng/searxng:latest
    ports: ["8080:8080"]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_course:ai_course@postgres:5432/ai_course
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ["8000:8000"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND_URL: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
